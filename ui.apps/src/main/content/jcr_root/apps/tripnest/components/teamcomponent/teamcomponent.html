<sly data-sly-use.model="com.tripnest.core.models.TeamModel">

    <h2>${model.team}</h2>

    <div data-sly-list.employee="${model.employees}">
        <h3>${employee.name}</h3>
        <h4>${employee.designation}</h4>
        <ul data-sly-list.skill="${employee.skills}">
            <li>${skill.skill}</li>
        </ul>
    </div>

</sly>
